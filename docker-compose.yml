services:
  student-portal:
    container_name: student-portal
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      API_BASE_URL: 'http://localhost:5000'
      NEXT_PUBLIC_ENV: production
      MAIN_COOKIE_DOMAIN: 'localhost'
      ROOT_COOKIE_DOMAIN: 'localhost'
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    container_name: student-portal-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: student_portal
      POSTGRES_USER: portal
      POSTGRES_PASSWORD: portal_secret
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U portal -d student_portal']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
